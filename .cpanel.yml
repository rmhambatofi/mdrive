---
deployment:
  tasks:
    # ── BACKEND ─────────────────────────────────────────────────────────────

    # 1. Mettre à jour les dépendances Python dans le virtualenv cPanel
    - /home/rama7388/virtualenv/mdrive/3.11/bin/pip install -r backend/requirements.txt --quiet

    # 2. Synchroniser le code source backend vers ~/mdrive/
    #    .env et userdata/ sont exclus pour préserver la config et les uploads
    - rsync -a --delete --exclude='.env' --exclude='.htaccess' --exclude='userdata/' --exclude='venv/' --exclude='__pycache__' --exclude='*.pyc' --exclude='logs/' backend/ /home/rama7388/mdrive/

    # 3. Appliquer les migrations de base de données
    - export FLASK_APP=run.py && cd /home/rama7388/mdrive && /home/rama7388/virtualenv/mdrive/3.11/bin/python -m flask db upgrade

    # 4. Redémarrer l'application Flask (Passenger)
    - mkdir -p /home/rama7388/mdrive/tmp && touch /home/rama7388/mdrive/tmp/restart.txt

    # ── FRONTEND ─────────────────────────────────────────────────────────────

    # 5-6. Installer les dépendances et builder le frontend React
    - cd frontend && npm install --prefer-offline && npm run build

    # 7. Synchroniser le build vers ~/drive.manitra.fr/
    - rsync -a --delete frontend/dist/ /home/rama7388/drive.manitra.fr/

    # 8. Déployer le .htaccess pour le routing SPA (React Router)
    - cp frontend/.htaccess /home/rama7388/drive.manitra.fr/.htaccess
